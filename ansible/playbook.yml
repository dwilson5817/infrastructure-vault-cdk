---

- hosts: 127.0.0.1
  connection: local
  tasks:
    - name: Install unzip
      ansible.builtin.package:
        name: unzip
        state: present

    - name: Unarchive AWS CLI bundle
      ansible.builtin.unarchive:
        src: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /
        remote_src: yes

    - name: Install the AWS CLI
      shell: /aws/install

    - name: Generate an SSH which will be used to connect to the EC2 instance
      community.crypto.openssh_keypair:
        path: ~/id_rsa

- hosts: all
  remote_user: ec2-user
  vars:
    ansible_ssh_private_key_file: ~/id_rsa
  gather_facts: no
  pre_tasks:
    - name: Tell EC2 Instance Connect about our SSH key
      ansible.builtin.shell: >-
        aws ec2-instance-connect send-ssh-public-key
        --region {{ placement.region }}
        --availability-zone {{ placement.availability_zone }}
        --instance-id {{ instance_id }}
        --instance-os-user ec2-user
        --ssh-public-key file://~/id_rsa.pub
      delegate_to: 127.0.0.1

    - name: Get summary information about the CloudFormation stack
      amazon.aws.cloudformation_info:
        stack_name: InfrastructureVaultStack
      register: cfn_output
      delegate_to: 127.0.0.1

    - name: Set DynamoDB table name as fact
      ansible.builtin.set_fact:
        vault_storage_dynamodb_table_name: "{{ cfn_output.cloudformation.InfrastructureVaultStack.stack_outputs.VaultStorageTableName }}"

    - name: Install Nginx
      ansible.builtin.package:
        name: nginx
        state: present
      become: yes

    - name: Ensure Nginx is started and enabled
      ansible.builtin.systemd_service:
        name: nginx
        state: started
        enabled: true
      become: yes

  roles:
    - name: acme
      vars:
        acme_cert_domain: vault.dylanw.net
        acme_contact: admin@dylanw.net
        cloudflare_zone: dylanw.net
      become: yes

    - role: nginxinc.nginx_config
      become: yes
      vars:
        nginx_config_http_template_enable: true
        nginx_config_http_template:
          - deployment_location: /etc/nginx/conf.d/vault.conf
            config:
              servers:
                - core:
                    listen:
                      - port: 443
                        address: '[::]'
                        ssl: yes
                      - port: 443
                        ssl: yes
                    server_name:
                      - vault.dylanw.net
                  ssl:
                    certificate: "/etc/acme/certs/vault.dylanw.net/fullchain.pem"
                    certificate_key: "/etc/acme/keys/vault.dylanw.net.pem"
                    prefer_server_ciphers: yes
                    session_timeout: 1d
                    session_cache:
                      shared:
                        name: SSL
                        size: 50m
                    session_tickets: no
                  locations:
                    - location: /
                      proxy:
                        pass: http://127.0.0.1:8200
                        set_header:
                          - field: Host
                            value: '$host'
                          - field: X-Real-IP
                            value: '$remote_addr'
                          - field: X-Forwarded-For
                            value: '$proxy_add_x_forwarded_for'
                          - field: X-Forwarded-Proto
                            value: https

    - name: vault
      become: yes

  post_tasks:
    - name: Create A record for on CloudFlare DNS
      community.general.cloudflare_dns:
        zone: dylanw.net
        record: vault
        type: A
        value: "{{ public_ip_address }}"
      delegate_to: 127.0.0.1
