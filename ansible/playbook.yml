---

- hosts: all
  pre_tasks:
    - name: Install collections and roles from Galaxy
      community.general.ansible_galaxy_install:
        type: both
        requirements_file: requirements.yml

  roles:
    - name: Install Nginx
      ansible.builtin.package:
        name: nginx
        state: present
      become: yes

    - name: Ensure Nginx is started and enabled
      ansible.builtin.systemd_service:
        name: nginx
        state: started
        enabled: true
      become: yes

    - name: acme
      vars:
        acme_cert_domain: vault.dylanw.net
        acme_contact: admin@dylanw.net
        cloudflare_zone: dylanw.net
      become: yes

    - role: nginxinc.nginx_config
      become: yes
      vars:
        nginx_config_http_template_enable: true
        nginx_config_http_template:
          - deployment_location: /etc/nginx/conf.d/vault.conf
            config:
              servers:
                - core:
                    listen:
                      - port: 443
                        address: '[::]'
                        ssl: yes
                      - port: 443
                        ssl: yes
                    server_name:
                      - vault.dylanw.net
                  ssl:
                    certificate: "/etc/acme/certs/vault.dylanw.net/fullchain.pem"
                    certificate_key: "/etc/acme/keys/vault.dylanw.net.pem"
                    prefer_server_ciphers: yes
                    session_timeout: 1d
                    session_cache:
                      shared:
                        name: SSL
                        size: 50m
                    session_tickets: no
                  locations:
                    - location: /
                      proxy:
                        pass: http://127.0.0.1:8200
                        set_header:
                          - field: Host
                            value: '$host'
                          - field: X-Real-IP
                            value: '$remote_addr'
                          - field: X-Forwarded-For
                            value: '$proxy_add_x_forwarded_for'
                          - field: X-Forwarded-Proto
                            value: https

    - name: vault
      become: yes

  post_tasks:
    - name: Create A record for on CloudFlare DNS
      community.general.cloudflare_dns:
        zone: dylanw.net
        record: vault
        type: A
        value: "{{ public_ip_address }}"
      delegate_to: 127.0.0.1
